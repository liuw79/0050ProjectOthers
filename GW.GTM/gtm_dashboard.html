<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM作业流程 - 控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .dashboard-header p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .dashboard-content {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .process-overview {
            text-align: center;
            margin-bottom: 40px;
        }

        .process-overview h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .process-overview p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .step-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            border-left: 5px solid #ddd;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .step-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .step-card.completed {
            border-left-color: #52c41a;
            background: #f6ffed;
        }

        .step-card.current {
            border-left-color: #1890ff;
            background: #e6f7ff;
            box-shadow: 0 5px 20px rgba(24, 144, 255, 0.2);
        }

        .step-card.pending {
            border-left-color: #d9d9d9;
            opacity: 0.7;
        }

        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .step-number {
            background: #1890ff;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .step-card.completed .step-number {
            background: #52c41a;
        }

        .step-card.pending .step-number {
            background: #d9d9d9;
        }

        .step-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .step-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .step-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-completed {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .status-current {
            background: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }

        .status-pending {
            background: #f5f5f5;
            color: #8c8c8c;
            border: 1px solid #d9d9d9;
        }

        .step-action {
            background: #1890ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .step-action:hover {
            background: #0050b3;
        }

        .step-card.completed .step-action {
            background: #52c41a;
        }

        .step-card.completed .step-action:hover {
            background: #389e0d;
        }

        .step-card.pending .step-action {
            background: #d9d9d9;
            color: #8c8c8c;
            cursor: not-allowed;
        }

        .dashboard-footer {
            text-align: center;
            margin-top: 40px;
        }

        .footer-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #1890ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .dashboard-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1890ff, #52c41a);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(24, 144, 255, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #1890ff;
            border: 2px solid #1890ff;
        }

        .btn-secondary:hover {
            background: #1890ff;
            color: white;
        }

        @media (max-width: 768px) {
            .steps-grid {
                grid-template-columns: 1fr;
            }

            .footer-stats {
                flex-direction: column;
                gap: 20px;
            }

            .dashboard-actions {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- 引入导航组件 -->
    <script src="http://localhost:3002/components/gtm_navigation.js"></script>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>🚀 GTM作业流程控制面板</h1>
            <p>Go-To-Market 战略制定完整流程 | 从目标分析到最终执行的系统化作业</p>
        </div>

        <div class="dashboard-content">
            <div class="process-overview">
                <h2>流程概览</h2>
                <p>
                    本GTM作业流程涵盖了从目标回顾到最终执行的完整环节。每个步骤都是相互关联的，
                    通过系统性的分析和规划，帮助你制定出有效的市场进入策略。
                </p>
            </div>

            <div class="steps-grid" id="stepsGrid">
                <!-- 步骤卡片将通过JavaScript动态生成 -->
            </div>

            <div class="dashboard-footer">
                <div class="footer-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">已完成步骤</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalSteps">8</div>
                        <div class="stat-label">总步骤数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="progressPercent">0%</div>
                        <div class="stat-label">完成进度</div>
                    </div>
                </div>

                <div class="dashboard-actions">
                    <button class="action-btn btn-primary" onclick="startGTMProcess()">
                        🎯 开始GTM作业
                    </button>
                    <button class="action-btn btn-secondary" onclick="showHelp()">
                        📚 查看使用指南
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 步骤配置（与导航组件保持一致）
        const steps = [
            {
                id: 'target_achievement',
                name: '目标达成回顾',
                description: '回顾上一阶段的目标完成情况，分析达成率和差距原因，为新的GTM策略提供基础数据。',
                url: 'http://localhost:3001/target_achievement_table.html',
                status: 'completed'
            },
            {
                id: 'product_review',
                name: '产品复盘',
                description: '全面复盘产品表现，识别优势、不足和待解决问题，为产品策略调整提供依据。',
                url: 'http://localhost:3002/product_review_simple.html',
                status: 'current'
            },
            {
                id: 'customer_analysis',
                name: '客户分析',
                description: '深入分析目标客户群体特征，了解客户需求、痛点和接触渠道，制定精准营销策略。',
                url: '#',
                status: 'pending'
            },
            {
                id: 'competitor_analysis',
                name: '竞品分析',
                description: '分析主要竞争对手的产品特性、定价策略和市场定位，识别差异化机会。',
                url: '#',
                status: 'pending'
            },
            {
                id: 'market_strategy',
                name: '市场策略',
                description: '基于前期分析结果，制定具体的市场推广策略和渠道选择方案。',
                url: '#',
                status: 'pending'
            },
            {
                id: 'action_plan',
                name: '行动计划',
                description: '将市场策略转化为具体的执行计划，包括时间安排、资源配置和责任分工。',
                url: '#',
                status: 'pending'
            },
            {
                id: 'risk_assessment',
                name: '风险评估',
                description: '识别和评估GTM过程中的潜在风险，制定相应的预防和应对措施。',
                url: '#',
                status: 'pending'
            },
            {
                id: 'final_summary',
                name: '综合汇总',
                description: '汇总所有分析结果和策略方案，生成完整的GTM作业报告。',
                url: '#',
                status: 'pending'
            }
        ];

        function renderStepsGrid() {
            const stepsGrid = document.getElementById('stepsGrid');

            stepsGrid.innerHTML = steps.map((step, index) => `
                <div class="step-card ${step.status}" onclick="navigateToStep('${step.id}', '${step.url}')">
                    <div class="step-header">
                        <div class="step-number">${index + 1}</div>
                        <div class="step-title">${step.name}</div>
                    </div>
                    <div class="step-description">${step.description}</div>
                    <div class="step-status">
                        <span class="status-badge status-${step.status}">
                            ${step.status === 'completed' ? '✅ 已完成' : step.status === 'current' ? '🔄 进行中' : '⏸️ 待开始'}
                        </span>
                        <button class="step-action" ${step.status === 'pending' ? 'disabled' : ''}>
                            ${step.status === 'completed' ? '查看' : step.status === 'current' ? '继续' : '开始'}
                        </button>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            const completedCount = steps.filter(s => s.status === 'completed').length;
            const currentCount = steps.filter(s => s.status === 'current').length;
            const totalCount = steps.length;
            const progressPercent = Math.round(((completedCount + currentCount) / totalCount) * 100);

            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('totalSteps').textContent = totalCount;
            document.getElementById('progressPercent').textContent = progressPercent + '%';
        }

        function navigateToStep(stepId, url) {
            if (url && url !== '#') {
                window.location.href = url;
            } else {
                alert(`"${stepId}"页面正在开发中，敬请期待！`);
            }
        }

        function startGTMProcess() {
            // 导航到第一个未完成的步骤
            const currentStep = steps.find(s => s.status === 'current');
            const firstPendingStep = steps.find(s => s.status === 'pending');

            if (currentStep) {
                navigateToStep(currentStep.id, currentStep.url);
            } else if (firstPendingStep) {
                navigateToStep(firstPendingStep.id, firstPendingStep.url);
            } else {
                // 所有步骤都完成了，跳转到汇总页面
                navigateToStep('final_summary', steps[steps.length - 1].url);
            }
        }

        function showHelp() {
            alert('GTM作业流程使用指南：\\n\\n1. 按照步骤顺序完成每个阶段的分析和策略制定\\n2. 每个步骤都基于前一步的结果，请确保按顺序完成\\n3. 可以随时返回已完成的步骤查看或修改内容\\n4. 最终汇总页面将整合所有步骤的成果\\n\\n如有疑问，请参考各步骤页面的详细说明。');
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderStepsGrid();
        });
    </script>
</body>
</html>
