<!DOCTYPE html>
<html>
<head>
    <title>练习：我的个人介绍</title>
</head>
<body>
    <!-- 第一步：添加一个主标题 -->
    <h1>在这里写你的名字</h1>
    
    <!-- 第二步：添加自我介绍段落 -->
    <p>在这里介绍你自己...</p>
    <p>在这里写更多关于你的信息...</p>
    
    <!-- 第三步：添加爱好列表 -->
    <h2>我的爱好</h2>
    <ul>
        <li>爱好1</li>
        <li>爱好2</li>
        <li>爱好3</li>
        <!-- 你可以添加更多爱好 -->
    </ul>
    
    <!-- 第四步：添加联系方式 -->
    <h2>联系我</h2>
    <p>邮箱：<a href="mailto:your@email.com">在这里写你的邮箱</a></p>
    <p>网站：<a href="https://www.example.com">在这里写你喜欢的网站</a></p>
    
    <!-- 第五步：添加更多内容（可选） -->
    <h2>关于学习</h2>
    <p>我正在学习HTML，这是我的练习页面！</p>
    
    <!-- 提示：你可以继续添加更多内容 -->
    <!-- 比如：技能列表、学习目标等 -->
</body>
</html>
