<html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .intro {
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }

        .skills {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .skill-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .skill-icon {
            font-size: 2em;
            margin-bottom: 10px;
            color: #667eea;
        }

        .contact {
            text-align: center;
            margin-top: 30px;
        }

        .contact-btn {
            display: inline-block;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .card {
                padding: 20px;
                margin: 10px 0;
            }

            h1 {
                font-size: 2em;
            }

            .avatar {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }

            .skills {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .contact-btn {
                display: block;
                margin: 10px 0;
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .intro {
                font-size: 1em;
            }

            .card {
                padding: 15px;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s ease-out;
        }

        .skill-item:nth-child(1) { animation-delay: 0.1s; }
        .skill-item:nth-child(2) { animation-delay: 0.2s; }
        .skill-item:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="avatar">👋</div>
                <h1>关于我</h1>
                <p class="subtitle">HTML初学者的学习之旅</p>
            </div>
            
            <p class="intro">
                你好！我是一名HTML初学者，正在探索Web开发的奇妙世界。<br>
                虽然刚刚起步，但我对学习新技术充满热情！
            </p>

            <div class="skills">
                <div class="skill-item">
                    <div class="skill-icon">📚</div>
                    <h3>正在学习</h3>
                    <p>HTML基础语法<br>CSS样式设计<br>响应式布局</p>
                </div>
                
                <div class="skill-item">
                    <div class="skill-icon">🎯</div>
                    <h3>学习目标</h3>
                    <p>掌握前端基础<br>创建美观网页<br>提升用户体验</p>
                </div>
                
                <div class="skill-item">
                    <div class="skill-icon">💡</div>
                    <h3>兴趣方向</h3>
                    <p>网页设计<br>用户界面<br>交互体验</p>
                </div>
            </div>

            <div class="contact">
                <h3 style="margin-bottom: 20px; color: #2c3e50;">联系我</h3>
                <a href="mailto:your-email@example.com" class="contact-btn">📧 发送邮件</a>
                <a href="#" class="contact-btn">💬 在线聊天</a>
            </div>
        </div>
    </div>

    <script>
        // 简单的交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const skillItems = document.querySelectorAll('.skill-item');
            
            skillItems.forEach(item => {
                item.addEventListener('click', function() {
                    this.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                });
            });

            // 添加滚动效果
            window.addEventListener('scroll', function() {
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    if (rect.top < window.innerHeight && rect.bottom > 0) {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }
                });
            });
        });
    </script>
</body>
</html>
