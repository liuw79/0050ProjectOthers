<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容创作系统 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .lark-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      background: #3385ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .lark-login-btn:hover {
      background: #2563eb;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo svg {
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <!-- 飞书logo -->
      <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <path d="M512 64C264.6 64 64 264.6 64 512c0 247.4 200.6 448 448h-64c-247.4 0-448-200.6-448-448s200.6 64 448 64h64zm0 384c-35.3 0-64 28.7-64 64v320c0 35.3 28.7 64 64h64v320zM896 128h-192v768h192c35.3 0 64-28.7 64-64V192c0-35.3-28.7-64-64zM256 320h-192v576h192c35.3 0 64-28.7 64-64V384c0-35.3-28.7-64-64z" fill="#3385ff"/>
      </svg>
    </div>
    <h1>内容创作系统</h1>
    <button class="lark-login-btn" onclick="handleLarkLogin()">
      使用飞书账号登录
    </button>
  </div>

  <script>
    async function handleLarkLogin() {
      // TODO: 实现飞书OAuth登录流程
      alert('飞书登录功能待实现，需要配置飞书应用凭证');
      // 登录成功后跳转到素材库页面
      // window.location.href = 'materials.html?userId=xxx';
    }
  </script>
</body>
</html>
