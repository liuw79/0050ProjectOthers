# NAS 清理工具配置文件
# 请根据您的实际情况修改以下配置

# ===========================================
# 基本配置
# ===========================================

# NAS 挂载路径（请根据您的实际情况修改）
# 群晖 NAS 通常为 /volume1
# 威联通 NAS 通常为 /share
# 自建 NAS 可能为 /mnt/nas 或其他路径
NAS_PATH="/volume1"

# 如果是远程 NAS，可以使用 SSH 挂载或 SMB/NFS 挂载
# 例如：NAS_PATH="/Volumes/YourNASName"

# ===========================================
# 文件大小阈值
# ===========================================

# 大文件阈值（查找大于此大小的文件）
# 支持的单位：K(KB), M(MB), G(GB)
MIN_FILE_SIZE="100M"

# 超大文件阈值（需要特别关注的文件）
LARGE_FILE_SIZE="1G"

# ===========================================
# 清理规则配置
# ===========================================

# 重复文件数量阈值
DUPLICATE_THRESHOLD=2

# 是否自动删除空目录（true/false）
AUTO_REMOVE_EMPTY_DIRS=false

# 是否自动删除临时文件（true/false）
AUTO_REMOVE_TEMP_FILES=false

# 临时文件保留天数（超过此天数的临时文件将被标记为可删除）
TEMP_FILE_DAYS=30

# ===========================================
# 文件类型配置
# ===========================================

# 需要特别关注的大文件类型
LARGE_FILE_EXTENSIONS=".iso .dmg .ova .vmdk .vdi .img .bin .zip .rar .7z .tar.gz .mkv .avi .mp4 .mov"

# 临时文件扩展名（这些文件类型会被标记为可清理）
TEMP_FILE_EXTENSIONS=".tmp .temp .cache .bak .old .swp .log .~*"

# 系统文件（通常可以安全删除）
SYSTEM_JUNK_FILES=".DS_Store Thumbs.db desktop.ini .Spotlight-V100 .Trashes .fseventsd"

# ===========================================
# 排除路径配置
# ===========================================

# 需要排除的目录（不进行分析和清理）
# 用空格分隔多个路径
EXCLUDE_PATHS="/volume1/@eaDir /volume1/@tmp /volume1/.system"

# 需要排除的文件模式
EXCLUDE_PATTERNS="*.lock *.pid @eaDir/*"

# ===========================================
# 报告和日志配置
# ===========================================

# 日志文件路径
LOG_FILE="/tmp/nas_cleanup.log"

# HTML 报告文件路径
REPORT_FILE="/tmp/nas_report.html"

# 是否生成详细报告（true/false）
DETAILED_REPORT=true

# 报告中显示的最大文件数量
MAX_FILES_IN_REPORT=100

# ===========================================
# 安全配置
# ===========================================

# 是否启用安全模式（在安全模式下，不会实际删除文件，只会生成报告）
SAFE_MODE=true

# 是否在删除前创建备份
CREATE_BACKUP=true

# 备份目录
BACKUP_DIR="/tmp/nas_backup"

# 是否需要确认才能删除文件
CONFIRM_DELETE=true

# ===========================================
# 性能配置
# ===========================================

# 并发处理数量（用于加速文件扫描）
MAX_PARALLEL_JOBS=4

# 扫描深度限制（防止扫描过深的目录结构）
MAX_DEPTH=10

# 单次扫描的最大文件数量
MAX_FILES_SCAN=100000

# ===========================================
# 通知配置
# ===========================================

# 是否发送邮件通知（需要配置邮件服务）
EMAIL_NOTIFICATION=false

# 邮件地址
EMAIL_TO="your-email@example.com"

# 邮件主题
EMAIL_SUBJECT="NAS 清理报告"

# ===========================================
# 高级配置
# ===========================================

# 是否启用重复文件检测（可能耗时较长）
ENABLE_DUPLICATE_DETECTION=true

# 重复文件检测方法（md5/sha256/size）
DUPLICATE_METHOD="md5"

# 是否启用文件内容分析
ENABLE_CONTENT_ANALYSIS=false

# 是否生成文件访问时间报告
ENABLE_ACCESS_TIME_ANALYSIS=true

# 长期未访问文件的天数阈值
UNUSED_FILE_DAYS=365

# ===========================================
# 自定义脚本路径
# ===========================================

# 清理前执行的自定义脚本
PRE_CLEANUP_SCRIPT=""

# 清理后执行的自定义脚本
POST_CLEANUP_SCRIPT=""

# ===========================================
# 说明
# ===========================================

# 1. 首次使用前，请务必修改 NAS_PATH 为您的实际 NAS 路径
# 2. 建议先在 SAFE_MODE=true 模式下运行，查看报告后再决定是否实际清理
# 3. 重要数据请务必备份后再进行清理操作
# 4. 可以根据您的 NAS 型号和使用习惯调整各项参数
# 5. 如有疑问，请查看 README.md 文档或联系技术支持