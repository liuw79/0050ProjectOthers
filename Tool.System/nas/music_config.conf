# 音乐文件分析和整理工具配置文件
# Music File Analysis and Organization Tool Configuration

# =============================================================================
# 基本路径配置 / Basic Path Configuration
# =============================================================================

# 音乐文件根目录 (可以是本地路径或NAS挂载路径)
# Music root directory (can be local path or NAS mount path)
MUSIC_ROOT_PATH="/volume1/music"

# 备用音乐路径 (用于多个音乐库)
# Alternative music paths (for multiple music libraries)
ALTERNATIVE_PATHS=(
    "/volume1/music/classical"
    "/volume1/music/jazz"
    "/volume1/music/rock"
    "/volume1/music/electronic"
)

# 输出目录配置
# Output directory configuration
LOG_DIRECTORY="./logs"
REPORT_DIRECTORY="./reports"
TEMP_DIRECTORY="/tmp/music_analysis"
BACKUP_DIRECTORY="./backups"

# =============================================================================
# 音乐文件格式配置 / Music File Format Configuration
# =============================================================================

# 支持的音乐文件扩展名
# Supported music file extensions
SUPPORTED_AUDIO_FORMATS=(
    # 无损格式 / Lossless formats
    "flac" "ape" "wav" "aiff" "dsd" "dsf" "dff"
    
    # 有损格式 / Lossy formats
    "mp3" "aac" "m4a" "ogg" "wma" "opus"
    
    # 其他格式 / Other formats
    "mka" "mpc" "tta" "wv"
)

# 高质量格式 (用于质量分析)
# High quality formats (for quality analysis)
HIGH_QUALITY_FORMATS=("flac" "ape" "wav" "aiff" "dsd" "dsf" "dff")

# 压缩格式 (用于空间分析)
# Compressed formats (for space analysis)
COMPRESSED_FORMATS=("mp3" "aac" "m4a" "ogg" "wma" "opus")

# =============================================================================
# 文件大小分类配置 / File Size Classification Configuration
# =============================================================================

# 文件大小分类阈值 (单位: MB)
# File size classification thresholds (unit: MB)
SIZE_TINY_MAX=5          # 微小文件上限
SIZE_SMALL_MAX=20        # 小文件上限
SIZE_MEDIUM_MAX=50       # 中等文件上限
SIZE_LARGE_MAX=100       # 大文件上限
# 超过 LARGE_MAX 的为超大文件

# 可疑文件大小 (可能是损坏或不完整的文件)
# Suspicious file sizes (possibly corrupted or incomplete files)
SUSPICIOUS_MIN_SIZE=1024    # 小于1KB的文件可能有问题
SUSPICIOUS_MAX_SIZE=1073741824  # 大于1GB的音乐文件可能有问题

# =============================================================================
# 重复文件检测配置 / Duplicate File Detection Configuration
# =============================================================================

# 重复检测方法
# Duplicate detection methods
DUPLICATE_CHECK_METHOD="md5"  # 可选: md5, sha1, sha256, size

# 是否检查文件名相似性
# Whether to check filename similarity
CHECK_FILENAME_SIMILARITY=true

# 文件名相似度阈值 (0-100)
# Filename similarity threshold (0-100)
FILENAME_SIMILARITY_THRESHOLD=80

# 是否忽略文件扩展名差异
# Whether to ignore file extension differences
IGNORE_EXTENSION_DIFF=true

# =============================================================================
# 目录结构分析配置 / Directory Structure Analysis Configuration
# =============================================================================

# 最大扫描深度
# Maximum scan depth
MAX_SCAN_DEPTH=10

# 目录文件数量警告阈值
# Directory file count warning threshold
DIR_FILE_COUNT_WARNING=1000

# 空目录检测
# Empty directory detection
DETECT_EMPTY_DIRS=true

# 单文件目录检测 (可能需要整理)
# Single file directory detection (may need organization)
DETECT_SINGLE_FILE_DIRS=true

# =============================================================================
# 命名规范检查配置 / Naming Convention Check Configuration
# =============================================================================

# 检查项目开关
# Check item switches
CHECK_SPECIAL_CHARS=true      # 检查特殊字符
CHECK_MULTIPLE_SPACES=true    # 检查多余空格
CHECK_LEADING_TRAILING_SPACES=true  # 检查前后空格
CHECK_NON_PRINTABLE=true      # 检查非打印字符
CHECK_UNICODE_ISSUES=true     # 检查Unicode问题
CHECK_CASE_CONSISTENCY=true   # 检查大小写一致性

# 允许的特殊字符
# Allowed special characters
ALLOWED_SPECIAL_CHARS="-_.,()[]{}!&'"

# 文件名长度限制
# Filename length limits
MAX_FILENAME_LENGTH=255
WARN_FILENAME_LENGTH=200

# =============================================================================
# 音乐元数据分析配置 / Music Metadata Analysis Configuration
# =============================================================================

# 是否分析音乐元数据
# Whether to analyze music metadata
ANALYZE_METADATA=true

# 检查缺失的元数据字段
# Check for missing metadata fields
REQUIRED_METADATA_FIELDS=("title" "artist" "album")
OPTIONAL_METADATA_FIELDS=("year" "genre" "track" "albumartist")

# 是否检查专辑封面
# Whether to check album artwork
CHECK_ALBUM_ARTWORK=true

# 专辑封面大小要求 (像素)
# Album artwork size requirements (pixels)
MIN_ARTWORK_SIZE=300
RECOMMENDED_ARTWORK_SIZE=600

# =============================================================================
# 性能和限制配置 / Performance and Limit Configuration
# =============================================================================

# 并发处理数量
# Concurrent processing count
MAX_CONCURRENT_JOBS=4

# 内存使用限制 (MB)
# Memory usage limit (MB)
MAX_MEMORY_USAGE=1024

# 单次处理文件数量限制
# Single processing file count limit
MAX_FILES_PER_BATCH=10000

# 进度显示间隔 (秒)
# Progress display interval (seconds)
PROGRESS_UPDATE_INTERVAL=1

# =============================================================================
# 报告生成配置 / Report Generation Configuration
# =============================================================================

# 报告格式
# Report formats
GENERATE_HTML_REPORT=true
GENERATE_CSV_REPORT=true
GENERATE_JSON_REPORT=false

# HTML报告样式
# HTML report style
HTML_THEME="modern"  # 可选: modern, classic, dark

# 是否包含图表
# Whether to include charts
INCLUDE_CHARTS=true

# 报告详细程度
# Report detail level
REPORT_DETAIL_LEVEL="detailed"  # 可选: summary, detailed, verbose

# =============================================================================
# 整理建议配置 / Organization Suggestion Configuration
# =============================================================================

# 是否生成整理建议
# Whether to generate organization suggestions
GENERATE_ORGANIZATION_SUGGESTIONS=true

# 建议的目录结构模式
# Suggested directory structure patterns
ORGANIZATION_PATTERN="artist/album"  # 可选: artist/album, genre/artist, year/artist

# 是否建议重命名文件
# Whether to suggest file renaming
SUGGEST_FILE_RENAMING=true

# 文件重命名模式
# File renaming pattern
FILE_NAMING_PATTERN="{track:02d} - {title}"  # 可选模式见文档

# =============================================================================
# 安全和备份配置 / Safety and Backup Configuration
# =============================================================================

# 是否在操作前创建备份
# Whether to create backup before operations
CREATE_BACKUP_BEFORE_CHANGES=true

# 备份保留天数
# Backup retention days
BACKUP_RETENTION_DAYS=30

# 是否启用安全模式 (只分析不修改)
# Whether to enable safe mode (analyze only, no modifications)
SAFE_MODE=true

# 需要确认的操作
# Operations requiring confirmation
REQUIRE_CONFIRMATION_FOR_DELETE=true
REQUIRE_CONFIRMATION_FOR_MOVE=true
REQUIRE_CONFIRMATION_FOR_RENAME=true

# =============================================================================
# 日志配置 / Logging Configuration
# =============================================================================

# 日志级别
# Log level
LOG_LEVEL="INFO"  # 可选: DEBUG, INFO, WARN, ERROR

# 是否启用详细日志
# Whether to enable verbose logging
VERBOSE_LOGGING=false

# 日志文件大小限制 (MB)
# Log file size limit (MB)
MAX_LOG_FILE_SIZE=100

# 日志文件保留数量
# Log file retention count
MAX_LOG_FILES=10

# =============================================================================
# 古典音乐特殊配置 / Classical Music Special Configuration
# =============================================================================

# 古典音乐目录识别关键词
# Classical music directory identification keywords
CLASSICAL_KEYWORDS=("classical" "symphony" "concerto" "sonata" "quartet" "opera" "bach" "mozart" "beethoven")

# 古典音乐特殊命名规则
# Classical music special naming rules
CLASSICAL_NAMING_PATTERN="{composer}/{work}/{movement}"

# 是否启用作曲家分组
# Whether to enable composer grouping
ENABLE_COMPOSER_GROUPING=true

# 常见作曲家列表 (用于自动分类)
# Common composer list (for automatic classification)
COMMON_COMPOSERS=(
    "Bach" "Mozart" "Beethoven" "Chopin" "Brahms" "Tchaikovsky"
    "Vivaldi" "Handel" "Haydn" "Schubert" "Schumann" "Liszt"
    "Debussy" "Ravel" "Stravinsky" "Prokofiev" "Rachmaninoff"
)

# =============================================================================
# 扩展功能配置 / Extended Feature Configuration
# =============================================================================

# 是否启用音频质量分析
# Whether to enable audio quality analysis
ENABLE_AUDIO_QUALITY_ANALYSIS=false

# 是否检查音频完整性
# Whether to check audio integrity
CHECK_AUDIO_INTEGRITY=false

# 是否生成播放列表
# Whether to generate playlists
GENERATE_PLAYLISTS=false

# 播放列表格式
# Playlist format
PLAYLIST_FORMAT="m3u"  # 可选: m3u, pls, xspf

# =============================================================================
# 网络和远程配置 / Network and Remote Configuration
# =============================================================================

# NAS连接配置 (如果需要远程分析)
# NAS connection configuration (if remote analysis is needed)
NAS_HOST=""
NAS_PORT="22"
NAS_USER=""
NAS_SSH_KEY=""

# 连接超时设置 (秒)
# Connection timeout settings (seconds)
CONNECTION_TIMEOUT=30
COMMAND_TIMEOUT=300

# =============================================================================
# 用户界面配置 / User Interface Configuration
# =============================================================================

# 是否启用彩色输出
# Whether to enable colored output
ENABLE_COLORS=true

# 是否显示进度条
# Whether to show progress bars
SHOW_PROGRESS_BARS=true

# 进度条样式
# Progress bar style
PROGRESS_BAR_STYLE="unicode"  # 可选: ascii, unicode, simple

# 是否启用交互模式
# Whether to enable interactive mode
INTERACTIVE_MODE=true

# 默认操作模式
# Default operation mode
DEFAULT_MODE="analyze"  # 可选: analyze, organize, cleanup

# =============================================================================
# 配置文件版本信息 / Configuration File Version Information
# =============================================================================

CONFIG_VERSION="1.0.0"
LAST_UPDATED="2024-01-20"
COMPATIBLE_SCRIPT_VERSION="1.0.0"

# =============================================================================
# 注意事项 / Important Notes
# =============================================================================

# 1. 修改配置后请重新运行脚本以使配置生效
# 2. 路径配置请使用绝对路径以避免问题
# 3. 在生产环境中建议先启用安全模式进行测试
# 4. 大型音乐库分析可能需要较长时间，请耐心等待
# 5. 建议定期备份重要的音乐文件

# 1. Please restart the script after modifying the configuration
# 2. Use absolute paths in path configuration to avoid issues
# 3. It's recommended to enable safe mode for testing in production
# 4. Large music library analysis may take a long time, please be patient
# 5. Regular backup of important music files is recommended