# Video Organizer Configuration
# 视频文件整理工具配置文件
# 基于实际分析的DS920plus视频目录结构

# =============================================================================
# 基础路径配置
# =============================================================================

# 视频文件根目录 (SMB挂载点)
VIDEO_BASE_PATH="/Volumes/video"

# 日志文件目录
LOG_DIR="$(dirname "$0")/logs"

# 报告文件目录
REPORT_DIR="$(dirname "$0")/reports"

# 备份目录 (可选)
BACKUP_DIR="/Volumes/video/#recycle"

# =============================================================================
# 文件格式配置
# =============================================================================

# 支持的视频格式 (逗号分隔)
SUPPORTED_FORMATS="mp4,mkv,avi,mov,wmv,flv,webm,m4v,3gp,ts,m2ts,mpg,mpeg,rm,rmvb"

# 高质量格式 (优先保留)
HIGH_QUALITY_FORMATS="mkv,mp4,m4v,webm"

# 低质量格式 (考虑转码或删除)
LOW_QUALITY_FORMATS="rm,rmvb,3gp,flv"

# =============================================================================
# 文件大小配置
# =============================================================================

# 最小文件大小 (小于此大小的文件会被标记)
MIN_FILE_SIZE="10M"

# 最大文件大小 (大于此大小的文件会被特别关注)
MAX_FILE_SIZE="50G"

# 超大文件阈值 (需要特殊处理)
HUGE_FILE_SIZE="10G"

# =============================================================================
# 目录结构配置 (基于实际目录结构)
# =============================================================================

# 现有目录映射
CATEGORY_MAPPING=(
    "电视:TV_SERIES:2.7T:8460files"
    "电影:MOVIES:4.3T:5616files"
    "动画:ANIMATION:1.3T:3862files"
    "演出:PERFORMANCES:1.5T:files"
    "记录片:DOCUMENTARIES:363G:540files"
    "教程:TUTORIALS:739G:5540files"
    "会议:MEETINGS:1.4G:18files"
    "课程分享:COURSES:16K:0files"
)

# 建议的新目录结构
NEW_STRUCTURE_ENABLED="false"
NEW_CATEGORIES=(
    "电影/国产"
    "电影/欧美"
    "电影/日韩"
    "电影/其他"
    "电视剧/国产"
    "电视剧/欧美"
    "电视剧/日韩"
    "电视剧/其他"
    "动画/国产"
    "动画/日本"
    "动画/欧美"
    "纪录片/自然"
    "纪录片/历史"
    "纪录片/科技"
    "纪录片/其他"
    "教程/技术"
    "教程/语言"
    "教程/生活"
    "演出/音乐会"
    "演出/话剧"
    "演出/其他"
)

# =============================================================================
# 整理规则配置
# =============================================================================

# 是否启用自动整理 (建议先设为false进行测试)
AUTO_ORGANIZE="false"

# 干运行模式 (true=仅分析不移动文件, false=实际执行)
DRY_RUN="true"

# 是否创建符号链接而不是移动文件
USE_SYMLINKS="false"

# 是否保留原始目录结构
PRESERVE_ORIGINAL="true"

# =============================================================================
# 重复文件处理
# =============================================================================

# 是否检测重复文件
DETECT_DUPLICATES="false"

# 重复文件处理策略 (keep_larger|keep_newer|keep_better_quality|manual)
DUPLICATE_STRATEGY="manual"

# 是否基于文件内容检测重复 (较慢但更准确)
CONTENT_BASED_DUPLICATE="false"

# =============================================================================
# 文件命名规则
# =============================================================================

# 是否标准化文件名
STANDARDIZE_NAMES="false"

# 文件名模式 (电影)
MOVIE_NAME_PATTERN="{title} ({year}) [{quality}].{ext}"

# 文件名模式 (电视剧)
TV_NAME_PATTERN="{series} S{season:02d}E{episode:02d} - {title}.{ext}"

# 是否移除特殊字符
REMOVE_SPECIAL_CHARS="false"

# =============================================================================
# 质量分析配置
# =============================================================================

# 是否分析视频质量
ANALYZE_QUALITY="true"

# 分辨率分类
RESOLUTION_CATEGORIES=(
    "4K:3840x2160,4096x2160"
    "2K:2560x1440,2048x1080"
    "1080p:1920x1080,1920x1088"
    "720p:1280x720"
    "480p:854x480,720x480"
    "360p:640x360"
)

# 比特率阈值 (Mbps)
HIGH_BITRATE="10"
MEDIUM_BITRATE="5"
LOW_BITRATE="2"

# =============================================================================
# 安全设置
# =============================================================================

# 是否启用回收站 (删除文件时移动到回收站而不是直接删除)
USE_RECYCLE_BIN="true"

# 回收站路径
RECYCLE_BIN_PATH="/Volumes/video/#recycle"

# 是否在操作前创建备份
CREATE_BACKUP="false"

# 备份保留天数
BACKUP_RETENTION_DAYS="30"

# 最大并发处理数
MAX_CONCURRENT="4"

# =============================================================================
# 报告和日志配置
# =============================================================================

# 是否生成HTML报告
GENERATE_HTML_REPORT="true"

# 是否自动打开报告
OPEN_REPORT="true"

# 日志级别 (DEBUG|INFO|WARN|ERROR)
LOG_LEVEL="INFO"

# 是否启用详细输出
VERBOSE="false"

# 报告包含的统计信息
REPORT_SECTIONS=(
    "file_count"
    "size_distribution"
    "format_analysis"
    "quality_analysis"
    "directory_structure"
    "duplicate_files"
    "large_files"
    "recommendations"
)

# =============================================================================
# 性能优化配置
# =============================================================================

# 是否使用缓存加速重复扫描
USE_CACHE="true"

# 缓存文件路径
CACHE_FILE="$(dirname "$0")/cache/video_cache.db"

# 缓存有效期 (小时)
CACHE_EXPIRY="24"

# 是否跳过隐藏文件
SKIP_HIDDEN_FILES="true"

# 是否跳过系统文件
SKIP_SYSTEM_FILES="true"

# 系统文件模式
SYSTEM_FILE_PATTERNS=".DS_Store,Thumbs.db,.@__thumb,@eaDir"

# =============================================================================
# 特殊处理配置
# =============================================================================

# 是否处理字幕文件
HANDLE_SUBTITLES="true"

# 字幕文件格式
SUBTITLE_FORMATS="srt,ass,ssa,vtt,sub,idx"

# 是否处理NFO文件 (媒体信息文件)
HANDLE_NFO_FILES="true"

# 是否处理海报图片
HANDLE_POSTER_IMAGES="true"

# 海报图片格式
POSTER_FORMATS="jpg,jpeg,png,webp"

# =============================================================================
# 网络和连接配置
# =============================================================================

# SMB连接超时 (秒)
SMB_TIMEOUT="30"

# 网络重试次数
NETWORK_RETRY="3"

# 是否在网络错误时暂停
PAUSE_ON_NETWORK_ERROR="true"

# =============================================================================
# 当前状态 (基于2024年分析)
# =============================================================================

# 总文件数: 约24,000个文件
# 总大小: 11TB
# 最大分类: 电影 (4.3TB, 5616文件)
# 第二大: 电视 (2.7TB, 8460文件)
# 第三大: 演出 (1.5TB)
# 需要关注: 课程分享目录为空，可能需要清理

# 建议优先处理:
# 1. 电影目录 - 文件数量大，可能有重复
# 2. 教程目录 - 文件数量最多 (5540个)
# 3. 回收站清理 - 当前有130个文件

# =============================================================================
# 使用说明
# =============================================================================

# 首次使用建议:
# 1. 保持 DRY_RUN="true" 进行测试
# 2. 检查生成的报告
# 3. 根据需要调整配置
# 4. 设置 DRY_RUN="false" 开始实际整理

# 安全提醒:
# - 在进行任何文件移动前，请确保有完整备份
# - 建议先在小范围目录测试
# - 定期检查回收站并清理不需要的文件