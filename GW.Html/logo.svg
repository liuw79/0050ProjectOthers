<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A0EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#91D6F2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="60" rx="8" fill="white" stroke="#00A0EB" stroke-width="2"/>
  
  <!-- 主标题 -->
  <text x="100" y="25" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#logoGradient)">高维学堂</text>
  
  <!-- 副标题 -->
  <text x="100" y="45" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#666">科学创业，少走弯路</text>
</svg>