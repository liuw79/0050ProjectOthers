<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <!-- 二维码背景 -->
  <rect width="160" height="160" fill="white" stroke="#00A0EB" stroke-width="2" rx="8"/>
  
  <!-- 模拟二维码图案 -->
  <g fill="#231815">
    <!-- 左上角定位点 -->
    <rect x="8" y="8" width="28" height="28" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="12" y="12" width="20" height="20" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="16" y="16" width="12" height="12"/>
    
    <!-- 右上角定位点 -->
    <rect x="124" y="8" width="28" height="28" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="128" y="12" width="20" height="20" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="132" y="132" width="12" height="12"/>
    
    <!-- 左下角定位点 -->
    <rect x="8" y="124" width="28" height="28" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="12" y="128" width="20" height="20" fill="none" stroke="#231815" stroke-width="2"/>
    <rect x="16" y="132" width="12" height="12"/>
    
    <!-- 数据点阵 -->
    <rect x="44" y="12" width="4" height="4"/>
    <rect x="52" y="12" width="4" height="4"/>
    <rect x="60" y="12" width="4" height="4"/>
    <rect x="68" y="12" width="4" height="4"/>
    <rect x="76" y="12" width="4" height="4"/>
    <rect x="84" y="12" width="4" height="4"/>
    <rect x="92" y="12" width="4" height="4"/>
    <rect x="100" y="12" width="4" height="4"/>
    <rect x="108" y="12" width="4" height="4"/>
    
    <rect x="44" y="20" width="4" height="4"/>
    <rect x="60" y="20" width="4" height="4"/>
    <rect x="76" y="20" width="4" height="4"/>
    <rect x="92" y="20" width="4" height="4"/>
    <rect x="108" y="20" width="4" height="4"/>
    
    <rect x="52" y="28" width="4" height="4"/>
    <rect x="68" y="28" width="4" height="4"/>
    <rect x="84" y="28" width="4" height="4"/>
    <rect x="100" y="28" width="4" height="4"/>
    
    <rect x="44" y="36" width="4" height="4"/>
    <rect x="60" y="36" width="4" height="4"/>
    <rect x="76" y="36" width="4" height="4"/>
    <rect x="92" y="36" width="4" height="4"/>
    <rect x="108" y="36" width="4" height="4"/>
    
    <!-- 更多数据点... -->
    <rect x="12" y="44" width="4" height="4"/>
    <rect x="20" y="44" width="4" height="4"/>
    <rect x="28" y="44" width="4" height="4"/>
    <rect x="44" y="44" width="4" height="4"/>
    <rect x="52" y="44" width="4" height="4"/>
    <rect x="68" y="44" width="4" height="4"/>
    <rect x="84" y="44" width="4" height="4"/>
    <rect x="100" y="44" width="4" height="4"/>
    <rect x="116" y="44" width="4" height="4"/>
    <rect x="132" y="44" width="4" height="4"/>
    <rect x="140" y="44" width="4" height="4"/>
    <rect x="148" y="44" width="4" height="4"/>
  </g>
  
  <!-- 中心LOGO -->
  <rect x="64" y="64" width="32" height="32" fill="white" stroke="#00A0EB" stroke-width="2" rx="4"/>
  <text x="80" y="84" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00A0EB">高维</text>
</svg>