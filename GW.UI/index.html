<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高维学院 - 项目导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00A0EB;
            --light-gray: #EFEFEF;
            --deep-black: #231815;
            --white: #FFFFFF;
            --text-secondary: #666666;
            --border-light: #E8E8E8;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.16);
        }

        body {
            font-family: "PingFang SC", "Alibaba PuHuiTi", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--light-gray) 0%, #F8F9FA 100%);
            color: var(--deep-black);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-medium);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0085C7 100%);
            color: var(--white);
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 400;
        }

        .content {
            padding: 40px 30px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--deep-black);
            margin-bottom: 20px;
            text-align: center;
        }

        .description {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .nav-card {
            background: var(--white);
            border: 2px solid var(--border-light);
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: var(--deep-black);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0085C7 100%);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px var(--shadow-medium);
            border-color: var(--primary-color);
        }

        .nav-card:hover::before {
            transform: scaleX(1);
        }

        .nav-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            flex-shrink: 0;
        }

        .nav-icon.personal {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0085C7 100%);
        }

        .nav-icon.coming-soon {
            background: linear-gradient(135deg, #52C41A 0%, #389E0D 100%);
        }

        .nav-content {
            flex: 1;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--deep-black);
        }

        .nav-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            display: inline-block;
        }

        .status-badge.ready {
            background-color: #F6FFED;
            color: #52C41A;
            border: 1px solid #B7EB8F;
        }

        .status-badge.development {
            background-color: #FFF7E6;
            color: #FA8C16;
            border: 1px solid #FFD591;
        }

        .footer {
            background: #F8F9FA;
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--border-light);
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .tech-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .tech-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .tech-icon {
            width: 16px;
            height: 16px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .container {
                width: 95%;
                margin: 20px auto;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 28px;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-card {
                padding: 20px;
            }
            
            .nav-icon {
                width: 50px;
                height: 50px;
            }
            
            .tech-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">高维学院</div>
            <div class="subtitle">Gaowei School - 现代化UI设计项目</div>
        </header>

        <main class="content">
            <h1 class="section-title">项目导航</h1>
            <p class="description">
                基于高维学院品牌规范设计的现代化界面集合，采用扁平化设计理念，提供优雅和谐的用户体验。
            </p>

            <div class="nav-grid">
                <a href="personal-center.html" class="nav-card">
                    <div class="nav-icon personal">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21V19C20 17.9 19.1 17 18 17H6C4.9 17 4 17.9 4 19V21" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">个人中心</div>
                        <div class="nav-desc">现代化个人中心页面，包含用户信息、学习数据统计、功能菜单等完整模块</div>
                        <span class="status-badge ready">✅ 已完成</span>
                    </div>
                </a>

                <div class="nav-card" style="cursor: not-allowed; opacity: 0.7;">
                    <div class="nav-icon coming-soon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                            <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"/>
                            <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"/>
                            <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">课程中心</div>
                        <div class="nav-desc">课程列表、学习进度、课程详情等功能页面</div>
                        <span class="status-badge development">🚧 开发中</span>
                    </div>
                </div>

                <div class="nav-card" style="cursor: not-allowed; opacity: 0.7;">
                    <div class="nav-icon coming-soon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M6 2L3 6V20C3 21.1 3.9 22 5 22H19C20.1 22 21 21.1 21 20V6L18 2H6Z" stroke="currentColor" stroke-width="2"/>
                            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 10C16 12.2 14.2 14 12 14C9.8 14 8 12.2 8 10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">小红花商城</div>
                        <div class="nav-desc">积分商城、商品展示、兑换记录等电商功能</div>
                        <span class="status-badge development">🚧 规划中</span>
                    </div>
                </div>

                <div class="nav-card" style="cursor: not-allowed; opacity: 0.7;">
                    <div class="nav-icon coming-soon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M17 21V19C17 17.9 16.1 17 15 17H9C7.9 17 7 17.9 7 19V21" stroke="currentColor" stroke-width="2"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                            <path d="M6 21V19C6 18.5 6.2 18 6.5 17.5C6.8 17 7.4 16.8 8 17H16C16.6 16.8 17.2 17 17.5 17.5C17.8 18 18 18.5 18 19V21" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">社交功能</div>
                        <div class="nav-desc">好友系统、邀请管理、社区互动等社交模块</div>
                        <span class="status-badge development">🚧 规划中</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p class="footer-text">基于高维学院品牌规范的现代化UI设计系统</p>
            <div class="tech-info">
                <div class="tech-item">
                    <div class="tech-icon"></div>
                    <span>响应式设计</span>
                </div>
                <div class="tech-item">
                    <div class="tech-icon"></div>
                    <span>扁平化UI</span>
                </div>
                <div class="tech-item">
                    <div class="tech-icon"></div>
                    <span>品牌色彩规范</span>
                </div>
                <div class="tech-item">
                    <div class="tech-icon"></div>
                    <span>现代CSS3</span>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
