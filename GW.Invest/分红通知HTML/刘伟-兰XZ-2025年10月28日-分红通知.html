<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兰XZ投资项目 - 刘伟分红通知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 20px 25px;
            text-align: center;
        }
        
        .project-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .date-info {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .recipient-name {
            font-size: 20px;
            color: #f39c12;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .content {
            padding: 15px 20px;
        }
        
        .greeting {
            padding: 10px 0;
            margin-bottom: 15px;
        }
        
        .greeting-text {
            font-size: 18px;
            line-height: 1.6;
            color: #2c3e50;
        }
        
        .dividend-info {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #f39c12;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .personal-amount {
            text-align: center;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #2196f3;
        }
        
        .amount-label {
            font-size: 18px;
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .amount-value {
            font-size: 36px;
            font-weight: bold;
            color: #0d47a1;
        }
        
        .ratio-info {
            font-size: 16px;
            color: #1976d2;
            margin-top: 8px;
        }
        
        .project-summary {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .summary-item {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .summary-label {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .summary-value {
            font-size: 17px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .footer {
            background: #f8f9fa;
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }
        
        .footer-text {
            font-size: 16px;
            color: #6c757d;
            line-height: 1.6;
        }
        
        .signature {
            margin-top: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="project-title">兰XZ投资项目分红通知</div>
        </div>
        
        <div class="content">
            <div class="greeting">
                <div class="greeting-text">
                    尊敬的刘伟，您好！<br>
                    现将第三次分红情况向您汇报如下：
                </div>
            </div>
            
            <div class="personal-amount">
                <div class="amount-label">本次分红金额</div>
                <div class="amount-value">105,832.89元</div>
                <div class="ratio-info">您的持股比例：18.75%</div>
            </div>

            
            <div class="project-summary">
                <div class="section-title">📊 项目概况</div>
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">项目启动</div>
                        <div class="summary-value">2023年8月30日</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">累计收益</div>
                        <div class="summary-value">1,222,837.05元</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">本次分红总额</div>
                        <div class="summary-value">564,442.07元</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">收益率</div>
                        <div class="summary-value">83.32%</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-text">
                如有任何疑问，请随时与我们联系。<br>
                再次感谢您的信任与支持！<br>
                您将负责向其他股东转账分红款。
            </div>
            <div class="signature">
                投资小组<br>
                2025年10月28日
            </div>
        </div>
    </div>
</body>
</html>
